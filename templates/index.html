<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediHub | Welcome</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #00796B; --primary-dark: #004D40; --accent: #FF5252; --glass: rgba(255, 255, 255, 0.92); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body {
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url('https://images.unsplash.com/photo-1519494026892-80bbd2d6fd0d?auto=format&fit=crop&w=1920&q=80');
            background-size: cover; background-position: center; background-attachment: fixed;
            height: 100vh; display: flex; justify-content: center; align-items: center;
        }
        .ticker { background: rgba(0, 77, 64, 0.95); color: white; padding: 10px 0; position: fixed; top: 0; width: 100%; z-index: 1000; font-size: 0.9rem; }
        .auth-card { background: var(--glass); backdrop-filter: blur(15px); padding: 30px; border-radius: 30px; width: 450px; box-shadow: 0 25px 50px rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.3); }
        .auth-card h2 { color: var(--primary-dark); margin-bottom: 15px; text-align: center; }
        .role-tabs { display: flex; background: #eee; padding: 5px; border-radius: 15px; margin-bottom: 15px; }
        .role-btn { flex: 1; padding: 8px; border: none; background: none; cursor: pointer; border-radius: 10px; font-weight: 600; color: #666; transition: 0.3s; font-size: 0.85rem; }
        .role-btn.active { background: var(--primary); color: white; }
        input, select { width: 100%; padding: 10px 15px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 12px; outline: none; transition: 0.3s; font-size: 0.9rem;}
        input:focus { border-color: var(--primary); box-shadow: 0 0 8px rgba(0,121,107,0.1); }
        .btn-main { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 1rem; transition: 0.3s; }
        .btn-main:hover { background: var(--primary-dark); transform: translateY(-2px); }
        .switch-text { text-align: center; margin-top: 15px; font-size: 0.85rem; color: #555; }
        .switch-text span { color: var(--primary); font-weight: bold; cursor: pointer; text-decoration: underline; }
        .hidden { display: none; }
        .otp-box { background: #e0f2f1; padding: 15px; border-radius: 12px; margin-bottom: 15px; text-align: center; }

        /* Update the container position */
        #toast-container {
            position: fixed;
            top: 20px;            /* Moved from bottom to top */
            left: 50%;            /* Center horizontally */
            transform: translateX(-50%); /* Align exactly in middle */
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;  /* Stack multiple toasts in center */
        }

        /* Update the animation to slide from top */
        .toast {
            background: white;
            color: #333;
            padding: 12px 25px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            margin-bottom: 10px; /* Space between multiple toasts */
            display: flex;
            align-items: center;
            border-left: 5px solid var(--primary);
            animation: slideDown 0.4s ease forwards;
            min-width: 320px;
        }

        @keyframes slideDown {
            from { transform: translateY(-100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .toast-fadeout {
            animation: fadeOutUp 0.4s ease forwards;
        }

        @keyframes fadeOutUp {
            to { transform: translateY(-200%); opacity: 0; }
        }
    </style>
</head>
<body>
    <div id="toast-container"></div>
    <div class="ticker">
        <marquee scrollamount="5">🚨 Blood Needed: B+ at City Center | 🏥 New Health Camp at West Plaza | 💉 COVID Booster Slots Open</marquee>
    </div>

    <div class="auth-card">
        <div id="login-section">
            <h2>Welcome Back</h2>
            <form id="login-form">
                <input type="text" name="fullname" placeholder="Full Name (Username)" required>
                <input type="password" name="password" placeholder="Password" required>
                <button type="submit" id="login-btn" class="btn-main">Login to MediHub</button>
            </form>
            <p class="switch-text">New to MediHub? <span onclick="showSignup()">Create an account</span></p>
        </div>

        <div id="signup-section" class="hidden">
            <h2>Join MediHub</h2>
            <div class="role-tabs">
                <button type="button" class="role-btn active" onclick="setRole('user')">User</button>
                <button type="button" class="role-btn" onclick="setRole('hospital')">Hospital</button>
                <button type="button" class="role-btn" onclick="setRole('admin')">Admin</button>
            </div>

            <form id="signup-form">
                <div id="common-fields">
                    <input type="text" name="fullname" id="name-field" placeholder="Full Name" required>
                    <input type="email" name="email" id="email-field" placeholder="Email Address" required>
                </div>

                <div id="hospital-fields" class="hidden">
                    <input type="text" name="license_id" id="license_id" placeholder="Medical License Number">
                    <input type="text" name="city" id="city" placeholder="City (e.g. Mumbai)">
                    <select name="hospital_type" id="hospital_type">
                        <option value="Private">Private Hospital</option>
                        <option value="Government">Government Hospital</option>
                    </select>
                    <input type="text" name="contact_no" id="contact_no" placeholder="Hospital Contact No.">
                </div>

                <input type="password" name="password_value" id="password_value" placeholder="Create Password" required>

                <div id="otp-section" class="hidden">
                    <div class="otp-box">
                        <p style="font-size: 0.8rem; color: var(--primary-dark);">Verification Code sent to your email.</p>
                        <input type="text" id="otp-input" maxlength="6" placeholder="Enter OTP" style="margin-top:10px; text-align:center; letter-spacing: 5px;">
                    </div>
                </div>

                <button type="button" id="action-btn" class="btn-main" onclick="handleSignupProcess()">Sign Up</button>
            </form>
            <p class="switch-text">Have an account? <span onclick="showLogin()">Login here</span></p>
        </div>
    </div>
    <script>
    // 1. TOOLBOX: Notification Logic
    function showToast(message, type = 'success') {
        const container = document.getElementById('toast-container');
        if(!container) return;
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i> <span style="margin-left:10px">${message}</span>`;
        container.appendChild(toast);
        setTimeout(() => {
            toast.classList.add('toast-fadeout');
            setTimeout(() => toast.remove(), 500);
        }, 4000);
    }

    let currentRole = 'user';

    function setRole(role) {
        currentRole = role;
        document.querySelectorAll('.role-btn').forEach(btn => {
            btn.classList.remove('active');
            if(btn.innerText.toLowerCase() === role) btn.classList.add('active');
        });
        const hospFields = document.getElementById('hospital-fields');
        const nameField = document.getElementById('name-field');
        if (role === 'hospital') {
            nameField.placeholder = "Hospital Name";
            hospFields.classList.remove('hidden');
        } else {
            nameField.placeholder = (role === 'admin') ? "Admin Full Name" : "Full Name";
            hospFields.classList.add('hidden');
        }
    }

    // 2. SIGNUP & VERIFY LOGIC
    async function handleSignupProcess() {
        const actionBtn = document.getElementById('action-btn');
        const otpSection = document.getElementById('otp-section');
        const form = document.getElementById('signup-form');

        if(!form.checkValidity()) { form.reportValidity(); return; }

        if (otpSection.classList.contains('hidden')) {
            actionBtn.innerText = "Sending OTP...";
            actionBtn.disabled = true;

            const formData = new FormData(form);
            formData.append('role', currentRole);

            try {
                const response = await fetch('/signup', { method: 'POST', body: formData });
                const result = await response.json();
                
                // One-line message handler
                showToast(result.message || "OTP Sent!", result.status === 'otp_sent' ? 'success' : 'error');

                if (result.status === 'otp_sent') {
                    otpSection.classList.remove('hidden');
                    actionBtn.innerText = "Verify & Register";
                    actionBtn.disabled = false;
                    document.getElementById('email-field').readOnly = true;
                } else {
                    actionBtn.innerText = "Sign Up";
                    actionBtn.disabled = false;
                }
            } catch (err) {
                showToast("Server Connection Failed", "error");
                actionBtn.innerText = "Sign Up";
                actionBtn.disabled = false;
            }
        } else {
            const otpValue = document.getElementById('otp-input').value;
            const emailValue = document.getElementById('email-field').value;

            const response = await fetch('/verify', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: emailValue, otp: otpValue })
            });
            const result = await response.json();

            // One-line message handler
            showToast(result.message || "Action Successful", result.status === 'success' ? 'success' : 'error');

            if (result.status === 'success') {
                setTimeout(() => window.location.reload(), 2000);
            }
        }
    }

    // 3. LOGIN LOGIC
    document.getElementById('login-form').onsubmit = async (e) => {
        e.preventDefault();
        const loginBtn = document.getElementById('login-btn');
        loginBtn.innerText = "Checking...";
        
        const formData = new FormData(e.target);
        const response = await fetch('/login', { method: 'POST', body: formData });
        const result = await response.json();
        
        if (result.status === 'success') {
            showToast("Login Successful! Redirecting...", "success");
            setTimeout(() => window.location.href = result.redirect, 1000);
        } else { 
            showToast(result.message, "error"); 
            loginBtn.innerText = "Login to MediHub";
        }
    };

    function showSignup() { document.getElementById('login-section').classList.add('hidden'); document.getElementById('signup-section').classList.remove('hidden'); }
    function showLogin() { document.getElementById('signup-section').classList.add('hidden'); document.getElementById('login-section').classList.remove('hidden'); }
    </script>
</body>
</html>
