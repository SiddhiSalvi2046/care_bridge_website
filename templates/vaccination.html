<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vaccination Card | MediHub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #00796B;
            --secondary: #004D40;
            --bg: #f4f7f9;
            --white: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: #333; line-height: 1.6; padding: 20px; }
        
        .container { 
            max-width: 1000px; 
            margin: 0 auto; 
            background: var(--white); 
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); 
        }

        h2 { color: var(--secondary); margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }

        /* Tabs Navigation */
        .tabs { 
            display: flex; 
            overflow-x: auto;
            margin-bottom: 25px; 
            border-bottom: 2px solid #eee; 
            gap: 10px;
        }
        .tab { 
            padding: 12px 20px; 
            cursor: pointer; 
            transition: 0.3s; 
            white-space: nowrap;
            color: #666;
            border-bottom: 3px solid transparent;
        }
        .tab.active { 
            border-bottom: 3px solid var(--primary); 
            font-weight: bold; 
            color: var(--primary); 
        }

        /* Content Sections */
        .section { display: none; animation: fadeIn 0.4s ease; }
        .section.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Form Controls */
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 0.9rem; }
        input, select { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #ddd; 
            border-radius: 10px; 
            outline: none; 
            transition: 0.3s;
        }
        input:focus, select:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(0,121,107,0.1); }
        
        button { 
            width: 100%; 
            padding: 12px; 
            background: var(--primary); 
            color: white; 
            border: none; 
            border-radius: 10px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 1rem;
            transition: 0.3s;
        }
        button:hover { background: var(--secondary); transform: translateY(-2px); }

        /* Cards & Lists */
        .center-card { 
            padding: 20px; 
            border: 1px solid #eee; 
            border-radius: 15px; 
            margin-bottom: 15px; 
            background: #fafafa;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .center-info h4 { color: var(--primary); margin-bottom: 5px; }
        .select-btn { width: auto; padding: 8px 15px; font-size: 0.8rem; background: #E0F2F1; color: var(--primary); }

        .error-msg { color: #d32f2f; font-size: 0.8rem; margin-top: 5px; }
        .success-banner { background: #E8F5E9; color: #2E7D32; padding: 15px; border-radius: 10px; margin-top: 15px; display: none; }

        .history-item { 
            padding: 15px; 
            border-left: 5px solid var(--primary); 
            background: #fff; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            margin-bottom: 10px;
            border-radius: 5px;
        }
        /* ---------- Popup Modal ---------- */
.popup-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 9999;
}

.popup-box {
    background: #fff;
    padding: 25px;
    width: 300px;
    border-radius: 15px;
    text-align: center;
    animation: fadeIn 0.3s ease;
}

.popup-box h3 {
    margin-bottom: 10px;
    color: var(--secondary);
}

.popup-box p {
    margin-bottom: 15px;
    color: #555;
}

.popup-box button {
    width: auto;
    padding: 8px 20px;
}
    </style>
</head>
<body>

<div class="container">
    <h2><i class="fas fa-syringe"></i> Vaccination Card</h2>
    
    <div class="tabs">
        <div class="tab active" data-tab="discover">Find Centers</div>
        <div class="tab" data-tab="pre-register">Book Slot</div>
        <div class="tab" data-tab="certificate">Certificates</div>
        <div class="tab" data-tab="history">My Records</div>
    </div>

    <div class="section active" id="discover">
        <form id="center-form">
            <button type="submit"><i class="fas fa-search"></i> Load Approved Centers</button>
        </form>
        <div id="centersList" style="margin-top:20px;"></div>
    </div>

    <div class="section" id="pre-register">
        <form id="preRegForm">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="userName" placeholder="Enter your full name" required>
                <input type="hidden" id="selectedCenterId">
            </div>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="form-group">
                    <label>Age Group</label>
                    <select id="userAge" required>
                        <option value="0-18">0-18 Years</option>
                        <option value="19-45" selected>19-45 Years</option>
                        <option value="46+">46+ Years</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Mobile Number</label>
                    <input type="tel" id="userContact" placeholder="10-digit number" required>
                </div>
            </div>

            <div class="form-group">
                <label>Selected Center</label>
                <input type="text" id="preferredLocation" placeholder="Select a center from 'Find Centers' or type here" required>
            </div>

            <div class="form-group">
                <label>Appointment Date</label>
                <input type="date" id="preferredDate" required>
            </div>

            <button type="submit">Confirm Appointment</button>
        </form>
        <div id="preRegMsg" class="success-banner"></div>
    </div>

    <div class="section" id="certificate">
        <div style="text-align: center; padding: 20px;">
            <i class="fas fa-file-contract fa-4x" style="color: #eee; margin-bottom: 15px;"></i>
            <h3>Digital Certificates</h3>
            <p style="color: #666; margin: 10px 0 20px;">Certificates are generated 24 hours after successful vaccination.</p>
            <a href="https://selfregistration.cowin.gov.in/" target="_blank" style="color: var(--primary); font-weight: bold;">Download from Govt. Portal →</a>
        </div>
    </div>

    <div class="section" id="history">
        <h3>Vaccination History</h3>
        <div id="historyList" style="margin-top:15px;">
            <p style="color:#888;">No history found. Book an appointment to get started.</p>
        </div>
    </div>

</div>

<script>
    /* ---------- Popup Functions ---------- */
function showPopup(title, message) {
    document.getElementById("popupTitle").textContent = title;
    document.getElementById("popupMessage").textContent = message;
    document.getElementById("popupModal").style.display = "flex";
}

function closePopup() {
    document.getElementById("popupModal").style.display = "none";
}
document.querySelectorAll('.tab').forEach(tab => {
    tab.onclick = () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));

        tab.classList.add('active');
        document.getElementById(tab.dataset.tab).classList.add('active');

        if (tab.dataset.tab === "history") {
            loadVaccinationHistory();   // 👈 Load history when clicked
        }
    };
});


/* ---------- Load Approved Centers ---------- */
document.getElementById('center-form').onsubmit = async (e) => {
    e.preventDefault();
    const list = document.getElementById('centersList');
    list.innerHTML = 'Loading...';

    const res = await fetch('/api/get_approved_vaccination_centers');
    const data = await res.json();

    if (!data.length) {
        list.innerHTML = 'No approved centers available.';
        return;
    }

    list.innerHTML = '';
    data.forEach(c => {
        list.innerHTML += `
            <div class="center-card">
                <div class="center-info">
                    <h4>${c.center_name}</h4>
                    <p>${c.city} | ${c.vaccine_type}</p>
                    <p>Slots: ${c.slots_available}</p>
                </div>
                <button class="select-btn"
                    onclick="selectCenter(${c.id}, '${c.center_name}', '${c.vaccine_type}')">
                    Select
                </button>
            </div>
        `;
    });
};

/* ---------- Select Center ---------- */
function selectCenter(id, name, type) {
    document.getElementById('selectedCenterId').value = id;
    document.getElementById('preferredLocation').value = name;

    // store vaccine type safely
    document.getElementById('preRegForm').dataset.vaccineType = type;

    document.querySelector('[data-tab="pre-register"]').click();
}


/* ---------- Book Slot ---------- */
document.getElementById('preRegForm').onsubmit = async (e) => {
    e.preventDefault();

    const payload = {
    center_id: document.getElementById('selectedCenterId').value,
    name: document.getElementById('userName').value,
    phone: document.getElementById('userContact').value,
    type: document.getElementById('preRegForm').dataset.vaccineType,
    date: document.getElementById('preferredDate').value
};

if (!payload.center_id) {
        showPopup("Warning ⚠️", "Please select a vaccination center first.");
        return;
    }

    if (!payload.phone.match(/^\d{10}$/)) {
        showPopup("Invalid Number ❌", "Please enter a valid 10-digit mobile number.");
        return;
    }


    const res = await fetch('/api/book_vaccination', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(payload)
    });

    if (res.ok) {
    showPopup("Success 🎉", "Appointment booked successfully!");
    e.target.reset();
} else {
    showPopup("Error ❌", "Booking failed. Please try again.");
}
};

/* ---------- Load Vaccination History ---------- */
async function loadVaccinationHistory() {
    const list = document.getElementById('historyList');
    list.innerHTML = 'Loading...';

    const res = await fetch('/get_vaccine_history');
    const data = await res.json();

    if (!data.length) {
        list.innerHTML = '<p style="color:#888;">No history found.</p>';
        return;
    }

    list.innerHTML = '';
    data.forEach(item => {
        list.innerHTML += `
            <div class="history-item">
                Vaccine: ${item.vaccine_type || 'N/A'}<br>
                Date: ${item.appointment_date}<br>
                Status: Booked
            </div>
        `;
    });
}

</script>
<!-- Popup Modal -->
<div id="popupModal" class="popup-overlay">
    <div class="popup-box">
        <h3 id="popupTitle"></h3>
        <p id="popupMessage"></p>
        <button onclick="closePopup()">OK</button>
    </div>
</div>
</body>
</html>
